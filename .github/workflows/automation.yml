name: Zotero to Readwise Automation

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 * * * *"

jobs:
  zotero-to-readwise-automation:
    runs-on: ubuntu-latest
    steps:
      - name: 🍽️ Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 💿 Install your modified Zotero2Readwise package and pyzotero 1.6.9
        run: |
          python -V
          pip install --upgrade pip setuptools wheel
          pip install -v pyzotero==1.6.9
          pip install -v git+https://github.com/e-alizadeh/Zotero2Readwise.git

      - name: 📥 Download the Python script needed for automation
        run: curl -fSL https://raw.githubusercontent.com/e-alizadeh/Zotero2Readwise/master/zotero2readwise/run.py -o run.py

      - name: 🚀 Run Automation and capture output (always write logs and stream to console)
        run: |
          # run script, stream stdout/stderr to both console and files; capture exit code
          # process substitution with tee works on ubuntu runners (bash)
          python -u run.py "${{ secrets.READWISE_TOKEN }}" "${{ secrets.ZOTERO_KEY }}" "${{ secrets.ZOTERO_ID }}" \
            > >(tee run_output.log) 2> >(tee run_error.log >&2) || RC=$?
          RC=${RC:-0}
          echo "Script exit code: $RC"
          # ensure files exist so upload-artifact doesn't fail
          : > run_output.log  # no-op if file exists
          : > run_error.log
        # Option A: let the step fail but still continue to uploads by using continue-on-error
        continue-on-error: true

      - name: 📄 Output failed Zotero items
        run: |
          FILE=$(python -c 'import zotero2readwise, os; print(os.path.join(os.path.dirname(zotero2readwise.__file__), "failed_zotero_items.json"))')
          if [ -f "$FILE" ]; then
            echo "Found failed_zotero_items.json at $FILE"
            cat "$FILE"
          else
            echo "No failed_zotero_items.json file found at $FILE"
          fi

      - name: 📤 Upload output log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run_output_log
          path: run_output.log

      - name: 📤 Upload error log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run_error_log
          path: run_error.log
        continue-on-error: true
