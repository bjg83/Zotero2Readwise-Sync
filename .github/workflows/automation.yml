name: Zotero to Readwise Automation

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 * * * *" # Runs every hour (Check https://crontab.guru/)
  workflow_dispatch:  # For manual trigger

jobs:
  zotero-to-readwise-automation:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout sync repo
        uses: actions/checkout@v4

      - name: 📥 Checkout Zotero2Readwise fork
        uses: actions/checkout@v4
        with:
          repository: bjg83/Zotero2Readwise
          path: Zotero2Readwise

      - name: 🧹 Remove nested .git to prevent submodule warning
        run: rm -rf Zotero2Readwise/.git

      - name: 🐍 Install uv
        uses: astral-sh/setup-uv@v4

      - name: 🔄 Sync Zotero to Readwise
        env:
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
          ZOTERO_KEY: ${{ secrets.ZOTERO_KEY }}
          ZOTERO_LIBRARY_ID: ${{ secrets.ZOTERO_ID }}
        run: uvx --from ./Zotero2Readwise zotero2readwise --use_since --batch_size 500 --recent_first y

      - name: 💾 Save library version for next run
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add since
          git diff --cached --quiet || git commit -m "chore: update zotero library version after sync"
          git push
