name: Zotero to Readwise Automation

on:
  push:
    branches:
      - master
  schedule:
    - cron: "0 * * * *"

jobs:
  zotero-to-readwise-automation:
    runs-on: ubuntu-latest
    steps:
      - name: 🍽️ Checkout the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 💿 Install your modified Zotero2Readwise package and pyzotero 1.6.9
        run: |
          python -V
          pip install --upgrade pip
          pip install -v pyzotero==1.6.9
          pip install -v git+https://github.com/e-alizadeh/Zotero2Readwise.git

      - name: 📥 Download the Python script needed for automation
        run: curl -fSL https://raw.githubusercontent.com/e-alizadeh/Zotero2Readwise/master/zotero2readwise/run.py -o run.py

      - name: 🚀 Run Automation and capture output
        run: |
          set -o pipefail
          python -u run.py "${{ secrets.READWISE_TOKEN }}" "${{ secrets.ZOTERO_KEY }}" "${{ secrets.ZOTERO_ID }}" > run_output.log 2> run_error.log || true
          echo "===== STDOUT ====="
          sed -n '1,200p' run_output.log || true
          echo "===== STDERR ====="
          sed -n '1,200p' run_error.log || true

      - name: 📤 Upload output log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run_output_log
          path: run_output.log

      - name: 📤 Upload error log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: run_error_log
          path: run_error.log
        continue-on-error: true
